name: publish

on:
  push:
    # engine-v* — fork release tags (upstream tobi/qmd owns the plain v* namespace)
    tags: ["engine-v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install exact dependencies
        run: npm ci
      - name: Verify reproducible package artifact
        run: npm run test:package
      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#engine-}"
          TAG="${TAG#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG does not match package.json version $PKG" >&2
            exit 1
          fi
      - name: Skip if version already published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          PKG="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$PKG" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_ENV"
            echo "$NAME@$PKG already on npm — skipping"
          fi
      - name: Publish
        if: env.already != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
