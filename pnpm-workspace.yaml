packages:
  - "."

# pnpm 11+ reads build-script approvals from pnpm-workspace.yaml, not package.json#pnpm.
# qmd-engine is used by SRE Agent for BM25-only markdown search, so only the
# native pieces needed for SQLite/BM25 and build tooling are allowed here.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild

ignoredBuiltDependencies:
  - node-llama-cpp
  - tree-sitter-go
  - tree-sitter-javascript
  - tree-sitter-python
  - tree-sitter-rust
  - tree-sitter-typescript

# Keep explicit booleans for the pi/pnpm supply-chain policy checker.
allowBuilds:
  better-sqlite3: true
  esbuild: true
  node-llama-cpp: false
  tree-sitter-go: false
  tree-sitter-javascript: false
  tree-sitter-python: false
  tree-sitter-rust: false
  tree-sitter-typescript: false
